{% extends "base.html" %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} Cliente{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-person-fill me-2 text-primary"></i>{{ 'Editar' if cliente else 'Nuevo' }} Cliente</h4>
    <a href="{{ url_for('clientes') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card" style="max-width:600px;">
    <div class="card-header">Datos del Cliente</div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">CI *</label>
                    <input type="text" name="ci" class="form-control" value="{{ cliente.ci if cliente else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="Activo" {% if not cliente or cliente.estado == 'Activo' %}selected{% endif %}>Activo</option>
                        <option value="Inactivo" {% if cliente and cliente.estado == 'Inactivo' %}selected{% endif %}>Inactivo</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Nombre Completo *</label>
                    <input type="text" name="nombre_completo" class="form-control" value="{{ cliente.nombre_completo if cliente else '' }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion" class="form-control" value="{{ cliente.direccion if cliente else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono if cliente else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" value="{{ cliente.correo if cliente else '' }}">
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-floppy me-1"></i>{{ 'Modificar' if cliente else 'Guardar' }}
                </button>
                <a href="{{ url_for('clientes') }}" class="btn btn-secondary px-4">
                    <i class="bi bi-x-circle me-1"></i>Limpiar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
