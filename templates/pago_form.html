{% extends "base.html" %}
{% block title %}{{ 'Editar' if pago else 'Nuevo' }} Pago{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-cash-stack me-2 text-danger"></i>{{ 'Editar' if pago else 'Nuevo' }} Pago</h4>
    <a href="{{ url_for('pagos') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card" style="max-width:520px;">
    <div class="card-header">Datos del Pago</div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Servicio *</label>
                    <select name="servicio_id" class="form-select" required>
                        <option value="">-- Seleccione servicio --</option>
                        {% for s in servicios %}
                        <option value="{{ s.id }}" {% if pago and pago.servicio_id == s.id %}selected{% endif %}>
                            {{ s.fallecido.nombre }} - {{ s.tipo_servicio }} - {{ s.fecha_servicio.strftime('%d/%m/%Y') }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fecha de Pago *</label>
                    <input type="date" name="fecha_pago" class="form-control"
                           value="{{ pago.fecha_pago.strftime('%Y-%m-%d') if pago else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Monto (Bs.) *</label>
                    <input type="number" step="0.01" name="monto" class="form-control"
                           value="{{ pago.monto if pago else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Método de Pago</label>
                    <select name="metodo_pago" class="form-select">
                        <option value="">-- Seleccione --</option>
                        <option value="Efectivo" {% if pago and pago.metodo_pago == 'Efectivo' %}selected{% endif %}>Efectivo</option>
                        <option value="Transferencia" {% if pago and pago.metodo_pago == 'Transferencia' %}selected{% endif %}>Transferencia</option>
                        <option value="Cheque" {% if pago and pago.metodo_pago == 'Cheque' %}selected{% endif %}>Cheque</option>
                        <option value="Tarjeta" {% if pago and pago.metodo_pago == 'Tarjeta' %}selected{% endif %}>Tarjeta</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="Pendiente" {% if not pago or pago.estado == 'Pendiente' %}selected{% endif %}>Pendiente</option>
                        <option value="Pagado" {% if pago and pago.estado == 'Pagado' %}selected{% endif %}>Pagado</option>
                        <option value="Anulado" {% if pago and pago.estado == 'Anulado' %}selected{% endif %}>Anulado</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2">{{ pago.observaciones if pago else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-floppy me-1"></i>{{ 'Modificar' if pago else 'Guardar' }}
                </button>
                <a href="{{ url_for('pagos') }}" class="btn btn-secondary px-4">
                    <i class="bi bi-x-circle me-1"></i>Limpiar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
