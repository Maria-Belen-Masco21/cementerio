{% extends "base.html" %}
{% block title %}{{ 'Editar' if usuario else 'Nuevo' }} Usuario{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-person-gear me-2"></i>{{ 'Editar' if usuario else 'Nuevo' }} Usuario</h4>
    <a href="{{ url_for('usuarios') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card" style="max-width:480px;">
    <div class="card-header">Datos del Usuario</div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Nombre Completo *</label>
                    <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre if usuario else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre de Usuario *</label>
                    <input type="text" name="username" class="form-control" value="{{ usuario.username if usuario else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Rol</label>
                    <select name="rol" class="form-select">
                        <option value="operador" {% if not usuario or usuario.rol == 'operador' %}selected{% endif %}>Operador</option>
                        <option value="admin" {% if usuario and usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Contraseña {% if usuario %}<span class="text-muted small">(dejar vacío para no cambiar)</span>{% else %}*{% endif %}</label>
                    <input type="password" name="password" class="form-control" {% if not usuario %}required{% endif %}>
                </div>
                {% if usuario %}
                <div class="col-12">
                    <div class="form-check">
                        <input type="checkbox" name="activo" class="form-check-input" id="activo" {% if usuario.activo %}checked{% endif %}>
                        <label class="form-check-label" for="activo">Usuario Activo</label>
                    </div>
                </div>
                {% endif %}
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-floppy me-1"></i>{{ 'Modificar' if usuario else 'Guardar' }}
                </button>
                <a href="{{ url_for('usuarios') }}" class="btn btn-secondary px-4">
                    <i class="bi bi-x-circle me-1"></i>Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
