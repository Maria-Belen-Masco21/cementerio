{% extends "base.html" %}
{% block title %}{{ 'Editar' if servicio else 'Nuevo' }} Servicio{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-clipboard2-check-fill me-2 text-warning"></i>{{ 'Editar' if servicio else 'Nuevo' }} Servicio</h4>
    <a href="{{ url_for('servicios') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card" style="max-width:620px;">
    <div class="card-header">Datos del Servicio</div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Cliente / Familiar *</label>
                    <select name="cliente_id" class="form-select" id="cliente_id" required>
                        <option value="">-- Seleccione cliente --</option>
                        {% for c in clientes %}
                        <option value="{{ c.id }}" {% if servicio and servicio.cliente_id == c.id %}selected{% endif %}>
                            {{ c.ci }} - {{ c.nombre_completo }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Fallecido *</label>
                    <select name="fallecido_id" class="form-select" required>
                        <option value="">-- Seleccione fallecido --</option>
                        {% for f in fallecidos %}
                        <option value="{{ f.id }}" {% if servicio and servicio.fallecido_id == f.id %}selected{% endif %}>
                            {{ f.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fecha de Servicio *</label>
                    <input type="date" name="fecha_servicio" class="form-control"
                           value="{{ servicio.fecha_servicio.strftime('%Y-%m-%d') if servicio else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo de Servicio *</label>
                    <select name="tipo_servicio" class="form-select" required>
                        <option value="">-- Seleccione --</option>
                        <option value="Inhumación" {% if servicio and servicio.tipo_servicio == 'Inhumación' %}selected{% endif %}>Inhumación</option>
                        <option value="Cremación" {% if servicio and servicio.tipo_servicio == 'Cremación' %}selected{% endif %}>Cremación</option>
                        <option value="Exhumación" {% if servicio and servicio.tipo_servicio == 'Exhumación' %}selected{% endif %}>Exhumación</option>
                        <option value="Traslado" {% if servicio and servicio.tipo_servicio == 'Traslado' %}selected{% endif %}>Traslado</option>
                        <option value="Mantenimiento" {% if servicio and servicio.tipo_servicio == 'Mantenimiento' %}selected{% endif %}>Mantenimiento</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Nicho Asignado</label>
                    <select name="nicho_id" class="form-select">
                        <option value="">-- Sin nicho --</option>
                        {% for n in nichos %}
                        <option value="{{ n.id }}" {% if servicio and servicio.nicho_id == n.id %}selected{% endif %}>
                            {{ n.codigo }} - {{ n.tipo }} ({{ n.ubicacion }}) - {{ n.estado }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Costo del Servicio (Bs.) *</label>
                    <input type="number" step="0.01" name="costo" class="form-control"
                           value="{{ servicio.costo if servicio else '' }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2">{{ servicio.observaciones if servicio else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-floppy me-1"></i>{{ 'Modificar' if servicio else 'Guardar' }}
                </button>
                <a href="{{ url_for('servicios') }}" class="btn btn-secondary px-4">
                    <i class="bi bi-x-circle me-1"></i>Limpiar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
